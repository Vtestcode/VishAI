<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VishAI</title>
  <link rel="icon" href="{{ request.url_for('static', path='vishai-logo.svg') }}" type="image/svg+xml" />
  <link rel="stylesheet" href="{{ request.url_for('static', path='styles.css') }}?v=20260407-namecase" />
  <style>
    html, body {
      height: 100%;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <div
    class="widget-wrapper"
    data-chat-root
    data-endpoint="/chat"
    data-stream-endpoint="/chat/stream"
    data-session-key="vishal_portfolio_chat_session"
  >
    <div class="widget-topbar">
      <div class="mini-brand">
        <img class="mini-brand-mark" src="{{ request.url_for('static', path='vishai-logo.svg') }}" alt="" aria-hidden="true" />
        <div>
          <h1>VishAI</h1>
          <p>A smarter way to know more about Vishal</p>
        </div>
      </div>
      <div class="presence" data-status>Ready for the next question</div>
    </div>

    <div class="quick-prompts" aria-label="Suggested prompts">
      <button class="prompt-chip" type="button" data-prompt="What kind of engineer is Vishal?">Profile</button>
      <button class="prompt-chip" type="button" data-prompt="Which project should I look at first?">Best project</button>
      <button class="prompt-chip" type="button" data-prompt="What should I know about Vishal?">About</button>
    </div>

    <div class="chat-messages" data-messages>
      <div class="message bot">
        <p>Hello. Ask me anything about Vishal's work, projects, and strengths.</p>
      </div>
    </div>

    <div class="chat-input-area">
      <div class="composer">
        <textarea
          data-input
          placeholder="Ask about experience, projects, or skills..."
          autocomplete="off"
        ></textarea>
        <div class="composer-bar">
          <div class="composer-meta">
            <span data-char-count>0 chars</span>
          </div>
          <button class="send-button" type="button" data-send>Send message</button>
        </div>
      </div>
    </div>
  </div>

  <script src="{{ request.url_for('static', path='chat.js') }}?v=20260407-stream"></script>
</body>
</html>
